<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVR HMS — Hospital Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a6644;--mint:#3ecb96;--dark:#0a0a0a;--paper:#f7f4ef;
  --white:#fff;--gray:#888;--border:rgba(0,0,0,.08);
  --red:#e05252;--blue:#3b82f6;--amber:#f59e0b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--paper);}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* LOGIN */
#lp{min-height:100vh;display:flex;position:relative;overflow:hidden;}
#lp::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,.04) 59px,rgba(255,255,255,.04) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,.03) 59px,rgba(255,255,255,.03) 60px);background-color:var(--green);}
.ll{flex:1;display:flex;flex-direction:column;justify-content:center;padding:4rem;position:relative;z-index:1;}
.ll-brand{margin-bottom:3rem;}
.ll-icon{width:50px;height:50px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.2rem;}
.ll-title{font-family:'Unbounded',sans-serif;font-weight:300;font-size:1.5rem;color:#fff;letter-spacing:-.02em;}
.ll-sub{font-size:.72rem;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:.3rem;}
.ll-tag{font-family:'Unbounded',sans-serif;font-weight:200;font-size:clamp(2rem,3.5vw,3.2rem);color:#fff;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem;}
.ll-tag span{color:var(--mint);}
.ll-desc{font-size:.82rem;color:rgba(255,255,255,.42);line-height:1.7;}
.lr{width:460px;background:var(--paper);display:flex;flex-direction:column;justify-content:center;padding:3rem;position:relative;z-index:1;}
.lr h2{font-family:'Unbounded',sans-serif;font-weight:400;font-size:1.1rem;color:var(--dark);margin-bottom:.3rem;}
.lr p{font-size:.78rem;color:var(--gray);margin-bottom:1.8rem;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:1.4rem;}
.rb{padding:.6rem .8rem;border:1.5px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;text-align:left;transition:all .18s;}
.rb:hover{border-color:var(--green);background:#f0f8f4;}
.rb.on{border-color:var(--green);background:var(--green);color:#fff;}
.rb .ri{font-size:1rem;margin-bottom:.18rem;display:block;}
.rb .rn{font-size:.7rem;font-weight:500;display:block;}
.rb .rd{font-size:.6rem;color:var(--gray);display:block;margin-top:.08rem;}
.rb.on .rd{color:rgba(255,255,255,.55);}
.fg{margin-bottom:.9rem;}
.fg label{display:block;font-size:.68rem;font-weight:500;color:var(--dark);margin-bottom:.35rem;letter-spacing:.04em;}
.fg input{width:100%;padding:.72rem 1rem;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--dark);outline:none;transition:border-color .2s;border-radius:4px;}
.fg input:focus{border-color:var(--green);}
.lbtn{width:100%;padding:.82rem;background:var(--green);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s;border-radius:4px;margin-top:.4rem;}
.lbtn:hover{background:#145236;}
.hint{margin-top:.9rem;padding:.7rem;background:rgba(26,102,68,.06);border-left:3px solid var(--mint);font-size:.7rem;color:var(--gray);line-height:1.6;border-radius:0 4px 4px 0;}
.hint b{color:var(--green);}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}
.tb{height:54px;background:var(--green);display:flex;align-items:center;padding:0 1.4rem;gap:.8rem;position:sticky;top:0;z-index:100;flex-shrink:0;}
.tb-brand{font-family:'Unbounded',sans-serif;font-weight:300;font-size:.82rem;color:#fff;letter-spacing:-.01em;}
.tb-brand span{color:var(--mint);}
.tb-role{margin-left:.4rem;padding:.18rem .55rem;background:rgba(255,255,255,.12);border-radius:20px;font-size:.58rem;color:rgba(255,255,255,.75);letter-spacing:.08em;text-transform:uppercase;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.9rem;}
.tb-user{font-size:.72rem;color:rgba(255,255,255,.55);}
.tb-out{padding:.28rem .75rem;border:1px solid rgba(255,255,255,.22);background:transparent;color:rgba(255,255,255,.65);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .18s;font-family:'DM Sans',sans-serif;}
.tb-out:hover{background:rgba(255,255,255,.1);color:#fff;}
.ab{flex:1;display:flex;overflow:hidden;}
.sb{width:210px;background:#fff;border-right:1px solid var(--border);padding:1rem 0;flex-shrink:0;overflow-y:auto;}
.sb-sec{margin-bottom:1.4rem;}
.sb-lbl{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);padding:0 1.1rem;margin-bottom:.35rem;}
.ni{display:flex;align-items:center;gap:.65rem;padding:.58rem 1.1rem;cursor:pointer;font-size:.78rem;color:#444;transition:all .15s;border-left:2px solid transparent;}
.ni:hover{background:#f5f5f5;color:var(--dark);}
.ni.on{background:#f0f8f4;color:var(--green);border-left-color:var(--green);font-weight:500;}
.ni .ic{font-size:.9rem;width:18px;text-align:center;}
.nb{margin-left:auto;background:var(--red);color:#fff;font-size:.52rem;padding:.08rem .3rem;border-radius:10px;}
.mc{flex:1;overflow-y:auto;padding:1.6rem;background:var(--paper);}
.pg{display:none;animation:fu .35s ease;}
.pg.on{display:block;}

/* COMPONENTS */
.ph{margin-bottom:1.3rem;}
.ph h2{font-family:'Unbounded',sans-serif;font-weight:400;font-size:1rem;color:var(--dark);}
.ph p{font-size:.75rem;color:var(--gray);margin-top:.18rem;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.9rem;margin-bottom:1.3rem;}
.sc{background:#fff;padding:1.1rem;border-radius:8px;border:1px solid var(--border);}
.sv{font-family:'Unbounded',sans-serif;font-weight:300;font-size:1.7rem;color:var(--dark);line-height:1;}
.sl{font-size:.65rem;color:var(--gray);margin-top:.25rem;letter-spacing:.04em;}
.schg{font-size:.62rem;margin-top:.35rem;}
.schg.up{color:#16a34a;}.schg.dn{color:var(--red);}
.sc .si{font-size:1.3rem;margin-bottom:.4rem;}
.tw{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden;margin-bottom:.9rem;}
.th{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.th h3{font-size:.8rem;font-weight:600;color:var(--dark);}
table{width:100%;border-collapse:collapse;}
th{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);padding:.65rem .9rem;text-align:left;border-bottom:1px solid var(--border);background:#fafafa;}
td{font-size:.76rem;color:#333;padding:.7rem .9rem;border-bottom:1px solid #f0f0f0;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.bx{display:inline-block;padding:.16rem .5rem;border-radius:20px;font-size:.58rem;font-weight:500;}
.bg{background:#dcfce7;color:#15803d;}.ba{background:#fef3c7;color:#b45309;}.br{background:#fee2e2;color:#b91c1c;}.bb{background:#dbeafe;color:#1d4ed8;}.bs{background:#f3f4f6;color:#6b7280;}
.btn{padding:.48rem .9rem;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.04em;}
.bg2{background:var(--green);color:#fff;}.bg2:hover{background:#145236;}
.bo{background:#fff;color:var(--green);border:1px solid var(--green);}.bo:hover{background:#f0f8f4;}
.sm{padding:.28rem .65rem;font-size:.62rem;}
.qa{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.7rem;margin-bottom:1.3rem;}
.qi{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.9rem;cursor:pointer;transition:all .18s;text-align:center;}
.qi:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,102,68,.1);}
.qi .qic{font-size:1.4rem;margin-bottom:.35rem;}
.qi .qin{font-size:.7rem;font-weight:500;color:var(--dark);}
.fc{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.3rem;margin-bottom:.9rem;}
.fc h3{font-size:.82rem;font-weight:600;color:var(--dark);margin-bottom:.9rem;padding-bottom:.55rem;border-bottom:1px solid var(--border);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.ff{margin-bottom:.8rem;}
.ff label{display:block;font-size:.68rem;font-weight:500;color:#555;margin-bottom:.28rem;}
.ff input,.ff select,.ff textarea{width:100%;padding:.58rem .75rem;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s;border-radius:4px;}
.ff input:focus,.ff select:focus{border-color:var(--green);}
.ff textarea{resize:vertical;min-height:75px;}
@media(max-width:768px){.ll{display:none;}.lr{width:100%;padding:2rem;}.sb{width:170px;}.stats{grid-template-columns:1fr 1fr;}.fr{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="lp">
  <div class="ll">
    <div class="ll-brand">
      <div class="ll-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="ll-title">RVR <span style="color:var(--mint)">HMS</span></div>
      <div class="ll-sub">Hospital Management System</div>
    </div>
    <div class="ll-tag">Welcome<br>Back<span>.</span></div>
    <div class="ll-desc">RVR Super Speciality Centre<br>Falnir, Mangaluru — 575002</div>
  </div>

  <div class="lr">
    <h2>Sign In</h2>
    <p>Select your role to continue</p>
    <div class="rg">
      <button class="rb on" onclick="setRole('admin')" id="role-admin"><span class="ri">👑</span><span class="rn">Admin</span><span class="rd">Full access</span></button>
      <button class="rb" onclick="setRole('doctor')" id="role-doctor"><span class="ri">🩺</span><span class="rn">Doctor</span><span class="rd">My patients</span></button>
      <button class="rb" onclick="setRole('reception')" id="role-reception"><span class="ri">🏥</span><span class="rn">Reception</span><span class="rd">Appointments</span></button>
      <button class="rb" onclick="setRole('hr')" id="role-hr"><span class="ri">👥</span><span class="rn">HR</span><span class="rd">Staff & payroll</span></button>
      <button class="rb" onclick="setRole('pharmacy')" id="role-pharmacy"><span class="ri">💊</span><span class="rn">Pharmacy</span><span class="rd">Medicines</span></button>
      <button class="rb" onclick="setRole('finance')" id="role-finance"><span class="ri">💰</span><span class="rn">Finance</span><span class="rd">Billing</span></button>
    </div>
    <div class="fg"><label>EMAIL / EMPLOYEE ID</label><input type="text" id="lu" value="admin@rvrhealthcare.in"></div>
    <div class="fg"><label>PASSWORD</label><input type="password" id="lpw" value="••••••••"></div>
    <button class="lbtn" onclick="doLogin()">Sign In →</button>
    <div class="hint"><b>Demo:</b> Select any role above and click Sign In. Each role shows a completely different dashboard.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="tb">
    <div class="tb-brand">RVR <span>HMS</span></div>
    <div class="tb-role" id="tb-role">Admin</div>
    <div class="tb-right">
      <div class="tb-user" id="tb-user">admin@rvrhealthcare.in</div>
      <button class="tb-out" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="ab">
    <div class="sb" id="sb"></div>
    <div class="mc" id="mc"></div>
  </div>
</div>

<script>
var role = 'admin';

var EMAILS = {admin:'vijay@rvrhealthcare.in',doctor:'dr.raghavendra@rvrhealthcare.in',reception:'reception@rvrhealthcare.in',hr:'hr@rvrhealthcare.in',pharmacy:'pharmacy@rvrhealthcare.in',finance:'finance@rvrhealthcare.in'};

var NAV = {
  admin:[
    {s:'Overview',i:[{id:'dashboard',ic:'📊',n:'Dashboard'},{id:'analytics',ic:'📈',n:'Analytics'}]},
    {s:'Hospital',i:[{id:'patients',ic:'🧑‍⚕️',n:'All Patients',b:3},{id:'appointments',ic:'📅',n:'Appointments'},{id:'doctors',ic:'🩺',n:'Doctors'},{id:'departments',ic:'🏥',n:'Departments'}]},
    {s:'Operations',i:[{id:'billing',ic:'🧾',n:'Billing'},{id:'pharmacy',ic:'💊',n:'Pharmacy'},{id:'hr',ic:'👥',n:'HR & Staff'}]},
    {s:'System',i:[{id:'settings',ic:'⚙️',n:'Settings'},{id:'audit',ic:'🔍',n:'Audit Log'}]}
  ],
  doctor:[
    {s:'My Work',i:[{id:'dashboard',ic:'📊',n:'My Dashboard'},{id:'mypatients',ic:'🧑‍⚕️',n:'My Patients',b:2},{id:'schedule',ic:'📅',n:'My Schedule'}]},
    {s:'Clinical',i:[{id:'notes',ic:'📝',n:'Clinical Notes'},{id:'prescriptions',ic:'💊',n:'Prescriptions'},{id:'laborders',ic:'🔬',n:'Lab Orders'}]},
    {s:'Profile',i:[{id:'earnings',ic:'💰',n:'My Earnings'},{id:'profile',ic:'👤',n:'My Profile'}]}
  ],
  reception:[
    {s:'Main',i:[{id:'dashboard',ic:'📊',n:'Dashboard'},{id:'newpatient',ic:'➕',n:'New Patient'},{id:'appointments',ic:'📅',n:'Appointments',b:5}]},
    {s:'Patients',i:[{id:'search',ic:'🔍',n:'Search Patient'},{id:'walkin',ic:'🚶',n:'Walk-ins'}]},
    {s:'Info',i:[{id:'doctors',ic:'🩺',n:'Doctor Schedule'},{id:'rooms',ic:'🏨',n:'Room Status'}]}
  ],
  hr:[
    {s:'HR',i:[{id:'dashboard',ic:'📊',n:'HR Dashboard'},{id:'staff',ic:'👥',n:'All Staff'},{id:'attendance',ic:'🕐',n:'Attendance'}]},
    {s:'Payroll',i:[{id:'payroll',ic:'💰',n:'Payroll'},{id:'payouts',ic:'💳',n:'Doctor Payouts'}]},
    {s:'Recruit',i:[{id:'leaves',ic:'🌴',n:'Leave Requests',b:2},{id:'onboarding',ic:'📋',n:'Onboarding'}]}
  ],
  pharmacy:[
    {s:'Pharmacy',i:[{id:'dashboard',ic:'📊',n:'Dashboard'},{id:'queue',ic:'⏳',n:'Prescription Queue',b:7},{id:'dispense',ic:'💊',n:'Dispense'}]},
    {s:'Inventory',i:[{id:'stock',ic:'📦',n:'Stock'},{id:'reorder',ic:'🔄',n:'Reorder Alerts',b:3},{id:'suppliers',ic:'🏭',n:'Suppliers'}]}
  ],
  finance:[
    {s:'Finance',i:[{id:'dashboard',ic:'📊',n:'Dashboard'},{id:'billing',ic:'🧾',n:'Billing'},{id:'insurance',ic:'🛡️',n:'Insurance'}]},
    {s:'Reports',i:[{id:'revenue',ic:'📈',n:'Revenue'},{id:'expenses',ic:'📉',n:'Expenses'},{id:'reports',ic:'📋',n:'Reports'}]}
  ]
};

var LABELS = {admin:'Administrator',doctor:'Doctor',reception:'Reception',hr:'HR Manager',pharmacy:'Pharmacist',finance:'Finance'};

function setRole(r) {
  role = r;
  document.querySelectorAll('.rb').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('role-'+r).classList.add('on');
  document.getElementById('lu').value = EMAILS[r];
}

function doLogin() {
  document.getElementById('lp').style.display = 'none';
  var app = document.getElementById('app');
  app.classList.add('show');
  document.getElementById('tb-role').textContent = LABELS[role];
  document.getElementById('tb-user').textContent = EMAILS[role];
  buildNav();
  loadPage('dashboard');
}

function doLogout() {
  document.getElementById('app').classList.remove('show');
  document.getElementById('lp').style.display = 'flex';
}

function buildNav() {
  var nav = NAV[role];
  var h = '';
  nav.forEach(function(sec) {
    h += '<div class="sb-sec"><div class="sb-lbl">'+sec.s+'</div>';
    sec.i.forEach(function(item) {
      h += '<div class="ni" id="ni-'+item.id+'" onclick="loadPage(\''+item.id+'\')"><span class="ic">'+item.ic+'</span><span>'+item.n+'</span>'+(item.b?'<span class="nb">'+item.b+'</span>':'')+'</div>';
    });
    h += '</div>';
  });
  document.getElementById('sb').innerHTML = h;
}

function loadPage(pid) {
  document.querySelectorAll('.ni').forEach(function(n){ n.classList.remove('on'); });
  var el = document.getElementById('ni-'+pid);
  if(el) el.classList.add('on');
  var content = getPage(pid);
  document.getElementById('mc').innerHTML = '<div class="pg on">'+content+'</div>';
  document.getElementById('mc').scrollTop = 0;
}

function getPage(pid) {
  var key = role+'_'+pid;
  if(PAGES[key]) return PAGES[key];
  var titles = {patients:'All Patients',analytics:'Analytics',departments:'Departments',billing:'Billing',pharmacy:'Pharmacy',hr:'HR & Staff',settings:'Settings',audit:'Audit Log',mypatients:'My Patients',schedule:'My Schedule',prescriptions:'Prescriptions',laborders:'Lab Orders',earnings:'My Earnings',profile:'My Profile',appointments:'Appointments',search:'Search Patient',walkin:'Walk-in Entry',doctors:'Doctor Schedule',rooms:'Room Status',staff:'All Staff',attendance:'Attendance',payroll:'Payroll',payouts:'Doctor Payouts',leaves:'Leave Requests',onboarding:'Onboarding',queue:'Prescription Queue',dispense:'Dispense Medicine',stock:'Stock Management',reorder:'Reorder Alerts',suppliers:'Suppliers',insurance:'Insurance Claims',revenue:'Revenue Reports',expenses:'Expenses',reports:'Reports'};
  var icons = {patients:'🧑‍⚕️',analytics:'📈',departments:'🏥',billing:'🧾',pharmacy:'💊',hr:'👥',settings:'⚙️',audit:'🔍',mypatients:'🧑‍⚕️',schedule:'📅',prescriptions:'💊',laborders:'🔬',earnings:'💰',profile:'👤',appointments:'📅',search:'🔍',walkin:'🚶',doctors:'🩺',rooms:'🏨',staff:'👥',attendance:'🕐',payroll:'💰',payouts:'💳',leaves:'🌴',onboarding:'📋',queue:'⏳',dispense:'💊',stock:'📦',reorder:'🔄',suppliers:'🏭',insurance:'🛡️',revenue:'📈',expenses:'📉',reports:'📋'};
  return '<div class="ph"><h2>'+(icons[pid]||'📄')+' '+(titles[pid]||pid)+'</h2><p>Full module available in the production build.</p></div><div class="fc"><h3>Module Details</h3><p style="font-size:.8rem;color:var(--gray);line-height:1.7">This section will be fully functional in the live HMS. The prototype demonstrates login, role dashboards, patient registration, clinical notes, and core workflows.<br><br></p><button class="btn bg2" onclick="loadPage(\'dashboard\')">← Back to Dashboard</button></div>';
}
